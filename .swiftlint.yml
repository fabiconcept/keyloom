disabled_rules:
  - identifier_name
  - multiple_closures_with_trailing_closure
  - trailing_whitespace
  - comma
  - redundant_discardable_let
  - for_where

opt_in_rules:
  - empty_count
  - closure_spacing

line_length:
  warning: 200
  error: 250
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 500
  error: 800

excluded:
  - build
  - DerivedData
  - .build
