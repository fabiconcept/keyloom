name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild -project KeyLoom.xcodeproj \
            -scheme KeyLoom \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run Tests
        run: |
          xcodebuild -project KeyLoom.xcodeproj \
            -scheme KeyLoom \
            -configuration Debug \
            -derivedDataPath build \
            -sdk macosx \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee test-output.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: KeyLoom.app
          path: build/Build/Products/Release/KeyLoom.app
          retention-days: 7

  lint:
    name: Lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint --strict
          else
            echo "SwiftLint not installed. Installing..."
            brew install swiftlint
            swiftlint --strict
          fi
