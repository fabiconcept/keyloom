name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Notarize
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release
        run: |
          xcodebuild -project KeyLoom.xcodeproj \
            -scheme KeyLoom \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Create DMG
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          mkdir -p build/DMG
          cp -R build/Build/Products/Release/KeyLoom.app build/DMG/
          ln -s /Applications build/DMG/Applications
          hdiutil create -volname "KeyLoom" -srcfolder build/DMG -ov -format UDZO "KeyLoom-$VERSION.dmg"
          rm -rf build/DMG

      - name: Notarize
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          xcrun notarytool submit "KeyLoom-$VERSION.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$AC_PASSWORD" \
            --wait
          xcrun stapler staple build/Build/Products/Release/KeyLoom.app

      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          gh release create "${{ github.ref_name }}" \
            --title "KeyLoom $VERSION" \
            --notes "See [CHANGELOG](https://github.com/fabiconcept/keyloom/releases) for details." \
            "KeyLoom-$VERSION.dmg"
